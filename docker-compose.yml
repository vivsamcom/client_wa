x-app: &app
  build: .
  env_file:
    - .env
  environment:
    DB_PROVIDER: ${DB_PROVIDER:-postgres}
    DB_URI: ${DB_URI:-postgresql://postgres:postgres@postgres:5432/client_wa}
    QUEUE_PROVIDER: ${QUEUE_PROVIDER:-lavinmq}
    QUEUE_URI: ${QUEUE_URI:-amqp://guest:guest@lavinmq:5672}
    WHATSAPP_INCOMING_QUEUE: ${WHATSAPP_INCOMING_QUEUE:-wa.incoming.messages}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    lavinmq:
      condition: service_healthy

services:
  app:
    <<: *app
    command: node src/server.js
    ports:
      - "3000:3000"

  worker:
    <<: *app
    command: node src/worker.js

  postgres-migrate:
    build: .
    command: node scripts/migrate-postgres.js
    profiles:
      - migrate
    env_file:
      - .env
    environment:
      DB_PROVIDER: ${DB_PROVIDER:-postgres}
      DB_URI: ${DB_URI:-postgresql://postgres:postgres@postgres:5432/client_wa}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: client_wa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_wa"]
      interval: 10s
      timeout: 5s
      retries: 5

  lavinmq:
    image: cloudamqp/lavinmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "lavinmqctl status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
