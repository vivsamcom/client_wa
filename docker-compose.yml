x-app: &app
  build: .
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy

services:
  api:
    <<: *app
    command: node src/server.js
    ports:
      - "3000:3000"
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *app
    command: node src/worker.js
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres-migrate:
    build: .
    command: node scripts/migrate-postgres.js
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: wa_password
      POSTGRES_DB: wa_loan_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_user -d wa_loan_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    profiles:
      - mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mongo_data:
